; ============================================
; 自动滚冲机 - PlatformIO 配置
; ============================================
; 如需切换板子，修改 board 字段：
;   ESP32-S3 DevKitC-1  -> esp32-s3-devkitc-1
;   ESP32-S3-BOX        -> esp32s3box
;   Arduino Uno         -> uno (atmelavr)

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; 串口监视器波特率
monitor_speed = 115200

; USB CDC 串口（ESP32-S3 原生 USB，免 CH340/CP2102）
board_build.arduino.usb_mode = 1
upload_protocol = esptool

; 依赖库
lib_deps =
    waspinator/AccelStepper @ ^1.64.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4

; 编译选项
build_flags =
    -Wall
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
